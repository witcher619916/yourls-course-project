apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: yourls-prod-ready
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./overlays/production-ready
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
